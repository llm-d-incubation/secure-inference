version: "2"
run:
  concurrency: 4
  go: ""
  modules-download-mode: readonly
  issues-exit-code: 1
  tests: true
output:
  formats:
    text:
      path: stdout
      print-linter-name: true
      print-issued-lines: false
      colors: false
linters:
  default: none
  enable:
    - asasalint
    - asciicheck
    - bidichk
    - bodyclose
    - contextcheck
    - durationcheck
    - errcheck
    - errname
    - errorlint
    - ginkgolinter
    - gocritic
    - godot
    - gosec
    - govet
    - grouper
    - importas
    - ineffassign
    - lll
    - loggercheck
    - makezero
    - misspell
    - nakedret
    # - nestif  # TODO: reduce complexity in server.go Check() and request.go parser
    - nilerr
    - nilnil
    - noctx
    - nolintlint
    - nonamedreturns
    - nosprintfhostport
    - prealloc
    - predeclared
    - promlinter
    - reassign
    - revive
    - staticcheck
    # - tagliatelle
    - testableexamples
    # - testpackage  # TODO: migrate white-box tests to _test packages
    - thelper
    - tparallel
    - unconvert
    - unparam
    - usestdlibvars
    - varnamelen
    - whitespace
  settings:
    errcheck:
      check-type-assertions: true
      check-blank: true
    gocritic:
      enabled-tags:
        - diagnostic
        - experimental
        - opinionated
        - performance
        - style
    lll:
      line-length: 130
    nakedret:
      max-func-lines: 1
    revive:
      rules:
        - name: dot-imports
          disabled: true
    staticcheck:
      checks:
        - all
        - -ST1003  # CRD field names (Id, BaseModelId) match Kubernetes API conventions
    varnamelen:
      max-distance: 20
      min-name-length: 2
      check-type-param: true
      ignore-type-assert-ok: true
      ignore-map-index-ok: true
      ignore-chan-recv-ok: true
      ignore-decls:
        - c echo.Context
        - t *testing.T
        - w http.ResponseWriter
        - r *http.Request
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      # Relax gosec file-permission checks in test files.
      - linters: [gosec]
        path: _test\.go
      # Relax errcheck in test files — test assertions cover failures.
      - linters: [errcheck]
        path: _test\.go
      # Relax unparam in test helpers.
      - linters: [unparam]
        path: _test\.go
      # Relax noctx in test helpers (net.Listen in tests).
      - linters: [noctx]
        path: _test\.go
      # G704 SSRF false positive — sidecar URL comes from admin config, not user input.
      - linters: [gosec]
        path: pkg/adapterselection/semantic/
        text: "G704"
      # deployment-customizer is an internal CLI tool — relax gosec.
      - linters: [gosec]
        path: cmd/deployment-customizer/
      # gocritic exitAfterDefer in main.go is intentional (defer for panic recovery).
      - linters: [gocritic]
        path: cmd/secure-inference/main\.go
        text: exitAfterDefer
    paths:
      - third_party$
      - builtin$
      - examples$
issues:
  max-issues-per-linter: 0
  max-same-issues: 0
  uniq-by-line: false
  fix: false
formatters:
  enable:
    - gofumpt
    - goimports
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
